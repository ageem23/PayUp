name: CI

on:
  push:
  pull_request:
    branches: [main]

# Least-privilege token: this workflow only reads the repo to lint/build/test.
permissions:
  contents: read

# Collapse the push/pull_request double-run for same-repo PR branches and
# cancel superseded runs on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholder values so the Supabase client's env guard passes during
          # the build/prerender (the runner has no .env.local). createClient()
          # makes no network calls at construction, so these are never used to
          # connect — they only satisfy the module-init check.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Test
        run: npm test
        env:
          # Tests mock the Supabase client, but provide placeholders so any
          # un-mocked import doesn't trip the module-init env guard.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
